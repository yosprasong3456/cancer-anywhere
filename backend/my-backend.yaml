apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: my-local-image  # ใช้ Docker image ที่อยู่ในเครื่อง
          imagePullPolicy: Never  # ไม่ให้ดึงจาก Registry
          ports:
            - containerPort: 3005